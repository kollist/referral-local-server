<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Referral server</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
  h1 { font-size: 20px; }
  h2 { font-size: 15px; color: #555; margin-top: 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 600; }
  code { background: #f2f2f2; padding: 1px 5px; border-radius: 4px; }
  button, input { font-size: 13px; padding: 6px 10px; }
  #genResult { margin-top: 10px; font-size: 13px; }
  .empty { color: #999; font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
  .on { background: #dcf5e3; color: #1c7a37; }
  .off { background: #f2f2f2; color: #888; }
</style>
</head>
<body>
  <h1>🔗 Referral server</h1>
  <p style="color:#666; font-size:13px;">
    Exact matching via App Clip / Universal Link invocation — no IP or device fingerprinting.
    DeviceCheck: <span id="dcBadge" class="badge off">—</span>
  </p>

  <h2>Generate a test invite link</h2>
  <input id="tokenInput" placeholder="any fake token, e.g. test-user-1" size="22">
  <input id="merchantInput" placeholder="merchant slug, e.g. vcc" size="16">
  <button onclick="generate()">Generate</button>
  <div id="genResult"></div>

  <h2>Issued codes</h2>
  <table id="codesTable"><thead><tr><th>Code</th><th>Merchant</th><th>Owner token</th><th>At</th></tr></thead><tbody></tbody></table>
  <div class="empty" id="codesEmpty" style="display:none;">No codes issued yet.</div>

  <h2>Redemptions</h2>
  <table id="redemptionsTable"><thead><tr><th>Code</th><th>Merchant</th><th>Device token</th><th>At</th></tr></thead><tbody></tbody></table>
  <div class="empty" id="redemptionsEmpty" style="display:none;">No redemptions yet.</div>

  <h2>Reset</h2>
  <button onclick="reset()">Wipe all test data</button>

<script>
async function generate() {
  const token = document.getElementById('tokenInput').value.trim() || 'test-user-1';
  const merchant = document.getElementById('merchantInput').value.trim() || 'vcc';
  const res = await fetch('/customers/referral?merchant=' + encodeURIComponent(merchant), { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  if (!res.ok) {
    document.getElementById('genResult').textContent = 'Error: ' + (data.error || res.status);
    return;
  }
  document.getElementById('genResult').innerHTML =
    'Code <code>' + data.referral_code + '</code> — link: <a href="' + data.referral_link + '" target="_blank">' + data.referral_link + '</a>';
  refresh();
}

async function reset() {
  await fetch('/debug/reset', { method: 'POST' });
  refresh();
}

async function refresh() {
  const res = await fetch('/api/state');
  const { codes, redemptions, device_check_enabled, merchant_count } = await res.json();

  const dcBadge = document.getElementById('dcBadge');
  dcBadge.textContent = device_check_enabled ? 'enabled' : 'disabled (local dedup)';
  dcBadge.className = 'badge ' + (device_check_enabled ? 'on' : 'off');

  const codesBody = document.querySelector('#codesTable tbody');
  codesBody.innerHTML = codes.map(c =>
    '<tr><td><code>' + c.code + '</code></td><td>' + c.merchant_slug + '</td><td>' + c.owner_token + '</td><td>' + c.created_at + '</td></tr>'
  ).join('');
  document.getElementById('codesEmpty').style.display = codes.length ? 'none' : 'block';

  const redemptionsBody = document.querySelector('#redemptionsTable tbody');
  redemptionsBody.innerHTML = redemptions.map(r =>
    '<tr><td><code>' + r.referral_code + '</code></td><td>' + r.merchant_slug + '</td><td>' + r.device_token + '</td><td>' + r.created_at + '</td></tr>'
  ).join('');
  document.getElementById('redemptionsEmpty').style.display = redemptions.length ? 'none' : 'block';
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
